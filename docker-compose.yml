services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.1
    container_name: hapvida-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
    ports:
      - '9200:9200'
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hapvida-backend
    env_file:
      - ./backend/.env
    ports:
      - '3001:3000'
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=prestadores
      - API_KEY=${API_KEY:-hapvida-secret-key}
      - PORT=3000
      - ORACLE_LIB_DIR=/opt/oracle/instantclient
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hapvida-frontend
    ports:
      - '8080:80'
    depends_on:
      - backend
    restart: unless-stopped

  indexador:
    build:
      context: ./indexador
      dockerfile: Dockerfile
    container_name: hapvida-indexador
    depends_on:
      - backend
    environment:
      - ORACLE_USER=${ORACLE_USER}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_CONNECTION_STRING=${ORACLE_CONNECTION_STRING}
      - API_URL=http://backend:3000
      - API_KEY=${API_KEY:-hapvida-secret-key}
      - BATCH_SIZE=5000
      - CLEAN_INDEX=${CLEAN_INDEX:-false}
    profiles:
      - indexador
    restart: 'no'

volumes:
  esdata:
    driver: local
